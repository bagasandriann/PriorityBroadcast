<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces">

<h:head>
    <title>Priority Broadcast</title>
</h:head>

<h:body>
    <h:form id="broadcastForm">
        <p:poll id="broadcastPoll"
                interval="1"
                listener="#{broadcastView.refresh}"
                update="broadcastStatus broadcastProgress customerTable"
                active="#{broadcastView.broadcastRunning}" />

        <p:panel header="Priority Broadcast">
            <p:commandButton value="Start Priority Broadcast"
                             action="#{broadcastView.startBroadcast}"
                             process="@this"
                             update="broadcastStatus broadcastProgress customerTable broadcastPoll" />

            <p:outputPanel id="broadcastStatus" style="margin-top: 12px; display: block;">
                <h:outputText value="#{broadcastView.broadcastStatus}" />
            </p:outputPanel>

            <p:progressBar id="broadcastProgress"
                           value="#{broadcastView.progress}"
                           labelTemplate="{value}%"
                           displayOnly="true"
                           style="margin-top: 12px;" />

            <p:dataTable id="customerTable"
                         value="#{broadcastView.customers}"
                         var="customer"
                         style="margin-top: 16px;">

                <p:column headerText="Name">
                    <h:outputText value="#{customer.name}" />
                </p:column>

                <p:column headerText="Phone Number">
                    <h:outputText value="#{customer.phoneNumber}" />
                </p:column>

                <p:column headerText="Status">
                    <h:outputText value="#{customer.status}" />
                </p:column>
            </p:dataTable>
        </p:panel>
    </h:form>
</h:body>

</html>
